<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Materias — School Schedule</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">📅 School Schedule</div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-user" id="user-info"></div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1>Materias y Grupos</h1>
        <div id="career-label" style="font-size:13px;color:var(--color-muted);margin-top:2px"></div>
      </div>
      <button class="btn btn-primary" id="btn-add-subject" data-shortcut="alt+n">+ Nueva materia</button>
    </div>

    <div class="filters-bar">
      <label>Carrera
        <select id="filter-career"><option value="">Todas</option></select>
      </label>
      <label>Semestre
        <select id="filter-semester">
          <option value="">Todos</option>
          <option>1</option><option>2</option><option>3</option>
          <option>4</option><option>5</option><option>6</option>
          <option>7</option><option>8</option><option>9</option>
        </select>
      </label>
      <label>Tipo
        <select id="filter-type">
          <option value="">Todos</option>
          <option value="0">Teórico</option>
          <option value="1">Laboratorio</option>
        </select>
      </label>
    </div>

    <div id="subjects-container">
      <p style="color:var(--color-muted);padding:16px">Cargando...</p>
    </div>
  </main>
</div>

<script type="module">
  import { initSidebar }     from '/assets/js/components/sidebar.js';
  import { initSubjectsPage } from '/assets/js/modules/subjects.js';
  await initSidebar('/subjects.html');
  initSubjectsPage();
</script>
</body>
</html>
