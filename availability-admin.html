<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disponibilidad Docente — School Schedule</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">📅 School Schedule</div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-user" id="user-info">Cargando...</div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Disponibilidad Docente</h1>
      <a href="/availability.html" target="_blank" class="btn btn-secondary btn-sm">
        Abrir formulario público ↗
      </a>
    </div>

    <div class="tabs" style="margin-bottom:24px">
      <button class="tab-btn active" data-tab="pending">Materias sin cobertura</button>
      <button class="tab-btn" data-tab="professors">Profesores registrados</button>
    </div>

    <div id="tab-pending"    class="tab-panel"><p style="color:var(--color-muted)">Cargando…</p></div>
    <div id="tab-professors" class="tab-panel" hidden></div>
  </main>
</div>

<!-- Professor detail modal -->
<div id="prof-modal" class="modal" hidden>
  <div class="modal-box" style="max-width:680px">
    <div class="modal-header">
      <h3 id="modal-prof-name">Profesor</h3>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-prof-body" style="padding:16px"></div>
  </div>
</div>

<script type="module">
  import { initSidebar }            from '/assets/js/components/sidebar.js';
  import { initAvailabilityAdmin }  from '/assets/js/modules/availability-admin.js';
  await initSidebar('/availability-admin.html');
  initAvailabilityAdmin();
</script>
</body>
</html>
