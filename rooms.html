<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salones — School Schedule</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">📅 School Schedule</div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-user" id="user-info"></div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Salones</h1>
      <button class="btn btn-primary" id="btn-add-room">+ Nuevo salón</button>
    </div>

    <div class="filters-bar">
      <label>Tipo
        <select id="filter-type">
          <option value="">Todos</option>
          <option value="theory">Teórico</option>
          <option value="lab">Laboratorio</option>
        </select>
      </label>
      <label>Estado
        <select id="filter-blocked">
          <option value="">Todos</option>
          <option value="0">Disponibles</option>
          <option value="1">Bloqueados</option>
        </select>
      </label>
    </div>

    <div class="card-grid" id="rooms-container">
      <p>Cargando...</p>
    </div>
  </main>
</div>

<script type="module">
  import { initSidebar } from '/assets/js/components/sidebar.js';
  import { initRoomsPage } from '/assets/js/modules/rooms.js';
  await initSidebar('/rooms.html');
  initRoomsPage();
</script>
</body>
</html>
