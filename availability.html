<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disponibilidad Docente — School Schedule</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body>
<div class="avail-page">

  <div class="avail-card">
    <h1 style="font-size:22px;font-weight:700;margin-bottom:4px">Disponibilidad Docente</h1>
    <p style="color:var(--color-muted);margin-bottom:24px">Registra tu nombre, selecciona los horarios en que puedes dar clase y las materias que impartes.</p>

    <div id="form-message" class="alert" hidden></div>

    <div class="form-stack">

      <label>
        Nombre completo
        <input id="prof-name-input" class="avail-input" placeholder="Ej. María González López" autocomplete="name" />
      </label>

      <div>
        <div style="font-weight:500;font-size:13px;margin-bottom:8px">Horarios disponibles</div>
        <p style="font-size:12px;color:var(--color-muted);margin-bottom:12px">Haz clic en los bloques para marcar en qué horarios puedes dar clase.</p>
        <div style="overflow-x:auto">
          <div id="grid-container"></div>
        </div>
      </div>

      <div>
        <div style="font-weight:500;font-size:13px;margin-bottom:8px">Materias que puedes impartir</div>
        <div style="position:relative">
          <input id="subject-search" class="avail-input" placeholder="Buscar materia…" autocomplete="off" />
          <div id="subject-dropdown" class="search-dropdown" hidden></div>
        </div>
        <div id="subject-tags" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px"></div>
      </div>

    </div>

    <div style="margin-top:24px;text-align:right">
      <button id="btn-save" class="btn btn-primary" style="padding:12px 32px;font-size:15px">
        Enviar disponibilidad
      </button>
    </div>
  </div>

</div>

<script type="module">
  import { initPublicAvailabilityPage } from '/assets/js/modules/availability.js';
  initPublicAvailabilityPage();
</script>
</body>
</html>
