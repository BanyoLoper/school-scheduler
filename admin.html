<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — School Schedule</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">📅 School Schedule</div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-user" id="user-info">Cargando...</div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Administración</h1>
    </div>

    <div id="public-links" style="margin-bottom:28px"></div>

    <div class="tabs" style="margin-bottom:24px">
      <button class="tab-btn active" data-tab="coordinators">Coordinadores</button>
      <button class="tab-btn" data-tab="careers">Carreras</button>
    </div>

    <div id="tab-coordinators"></div>
    <div id="tab-careers" style="display:none"></div>
  </main>
</div>

<script type="module">
  import { getProfile, isAdmin } from '/assets/js/core/profile.js';
  import { initSidebar }         from '/assets/js/components/sidebar.js';
  import { loadCoordinators }    from '/assets/js/modules/admin.js';
  import { loadCareers }         from '/assets/js/modules/careers-admin.js';

  const profile = await getProfile();
  if (!isAdmin()) { window.location.href = '/dashboard.html'; }

  await initSidebar('/admin.html');

  // Public links section
  const base = window.location.origin;
  const PUBLIC = [
    { label: 'Disponibilidad docente', href: `${base}/availability.html`, desc: 'Profesores registran sus franjas horarias' },
    { label: 'Reporte de fallas',      href: `${base}/reports.html`,      desc: 'Alumnos y docentes reportan equipos con problemas' },
  ];
  document.getElementById('public-links').innerHTML = `
    <div class="table-container" style="padding:16px">
      <p style="font-size:13px;font-weight:600;margin-bottom:12px;color:var(--color-muted);text-transform:uppercase;letter-spacing:.05em">Links públicos (sin acceso restringido)</p>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${PUBLIC.map(p => `
          <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--color-bg);border-radius:var(--radius);border:1px solid var(--color-border)">
            <div style="flex:1">
              <div style="font-weight:500">${p.label}</div>
              <div style="font-size:12px;color:var(--color-muted)">${p.desc}</div>
              <div style="font-size:12px;color:var(--color-primary);margin-top:2px">${p.href}</div>
            </div>
            <button class="btn btn-sm" data-copy="${p.href}" title="Copiar enlace">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copiar
            </button>
          </div>`).join('')}
      </div>
    </div>`;

  document.getElementById('public-links').addEventListener('click', async e => {
    const btn = e.target.closest('[data-copy]');
    if (!btn) return;
    await navigator.clipboard.writeText(btn.dataset.copy);
    const orig = btn.innerHTML;
    btn.textContent = '✓ Copiado';
    setTimeout(() => { btn.innerHTML = orig; }, 1800);
  });

  const tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach(btn => btn.addEventListener('click', () => {
    tabs.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-coordinators').style.display = btn.dataset.tab === 'coordinators' ? '' : 'none';
    document.getElementById('tab-careers').style.display      = btn.dataset.tab === 'careers'      ? '' : 'none';
  }));

  loadCoordinators('tab-coordinators');
  loadCareers('tab-careers');
</script>
</body>
</html>
