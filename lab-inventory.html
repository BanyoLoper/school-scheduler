<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventario de Laboratorios — School Schedule</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">📅 School Schedule</div>
    <nav class="sidebar-nav"></nav>
    <div class="sidebar-user" id="user-info"></div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Inventario de Software por Laboratorio</h1>
      <button class="btn btn-primary" id="btn-add-software" data-shortcut="alt+n">+ Agregar software</button>
    </div>

    <div class="filters-bar">
      <label>Laboratorio
        <select id="filter-room">
          <option value="">Selecciona un lab</option>
        </select>
      </label>
    </div>

    <div id="software-container">
      <p class="text-muted">Selecciona un laboratorio para ver su software instalado.</p>
    </div>
  </main>
</div>

<script type="module">
  import { initSidebar } from '/assets/js/components/sidebar.js';
  import { initLabInventoryPage } from '/assets/js/modules/lab-inventory.js';
  await initSidebar('/lab-inventory.html');
  initLabInventoryPage();
</script>
</body>
</html>
